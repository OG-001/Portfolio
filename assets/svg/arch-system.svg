  <text x="745" y="133" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#818cf8" text-anchor="middle">🗂 Admin Prompts</text>
  <text x="745" y="148" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">GlobalPromptForm</text>
  <text x="745" y="162" font-family="Inter,sans-serif" font-size="8.5" fill="#64748b" text-anchor="middle">Category + Formik</text>

  <text x="836" y="150" font-family="Inter,sans-serif" font-size="9" fill="#6366f1" text-anchor="middle" font-style="italic">Next.js 16</text>
  <text x="836" y="164" font-family="Inter,sans-serif" font-size="9" fill="#64748b" text-anchor="middle" font-style="italic">TypeScript</text>

