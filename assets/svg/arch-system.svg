  <rect x="80" y="220" width="840" height="120" rx="14" fill="rgba(6,182,212,0.05)" stroke="rgba(6,182,212,0.25)" stroke-width="1.5" stroke-dasharray="6,3"/>

  <rect x="110" y="240" width="185" height="76" rx="10" fill="rgba(6,182,212,0.12)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="203" y="275" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#22d3ee" text-anchor="middle">GET /usage/dashboard</text>
  <text x="203" y="290" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">GET /usage/summary</text>
