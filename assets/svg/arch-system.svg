  <!-- Next.js Frontend box -->
  <rect x="80" y="80" width="840" height="120" rx="14" fill="rgba(99,102,241,0.06)" stroke="rgba(99,102,241,0.25)" stroke-width="1.5" stroke-dasharray="6,3"/>
  
  <rect x="110" y="100" width="160" height="76" rx="10" fill="rgba(99,102,241,0.12)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="190" y="133" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#818cf8" text-anchor="middle">📊 Statistics</text>
