  <text x="20" y="112" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#6366f1" letter-spacing="1.5" text-transform="uppercase">CLIENT LAYER</text>
  <text x="20" y="252" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#06b6d4" letter-spacing="1.5">API GATEWAY</text>
