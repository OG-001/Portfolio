  <text x="613" y="428" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Global + Individual</text>
  <text x="613" y="443" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">LiteLLM routing</text>

  <rect x="725" y="380" width="175" height="76" rx="10" fill="rgba(16,185,129,0.12)" stroke="#10b981" stroke-width="1.5"/>
  <text x="812" y="413" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#34d399" text-anchor="middle">Auth &amp; Audit</text>
  <text x="812" y="428" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">SAML / Azure AD</text>
  <text x="812" y="443" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Audit log retention</text>

