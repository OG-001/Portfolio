  <text x="375" y="561" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Celery / Session</text>

  <rect x="480" y="518" width="160" height="62" rx="10" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="560" y="546" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fbbf24" text-anchor="middle">🔍 Vespa</text>
  <text x="560" y="561" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Vector search</text>

  <rect x="665" y="518" width="160" height="62" rx="10" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="745" y="546" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fbbf24" text-anchor="middle">🤖 LLM Providers</text>
  <text x="745" y="561" font-family="Inter,sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">OpenAI · Anthropic · etc</text>

