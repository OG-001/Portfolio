<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" style="background:#0d0f14;border-radius:16px">
  <!-- Background -->
  <rect width="780" height="460" fill="#0d0f14" rx="16"/>
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.5" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="780" height="460" fill="url(#dots)"/>

  <!-- Title bar -->
  <text x="390" y="34" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#f1f5f9" text-anchor="middle">Multi-Level Prompt Selector</text>
  <text x="390" y="52" font-family="Inter,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Popover component — categorised global + individual prompts</text>

  <!-- Chat input bar area -->
  <rect x="40" y="74" width="700" height="72" rx="14" fill="#1a1d27" stroke="#252836" stroke-width="1.5"/>
  <text x="80" y="116" font-family="Inter,sans-serif" font-size="11" fill="#475569">Ask anything or select a prompt template...</text>

  <!-- Prompt library button -->
  <rect x="58" y="130" width="120" height="28" rx="14" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="118" y="149" font-family="Inter,sans-serif" font-size="9.5" font-weight="600" fill="#818cf8" text-anchor="middle">📚 Prompt Library</text>

  <!-- Other toolbar buttons -->
  <rect x="186" y="130" width="80" height="28" rx="14" fill="rgba(255,255,255,0.04)" stroke="#252836" stroke-width="1"/>
  <text x="226" y="149" font-family="Inter,sans-serif" font-size="9.5" fill="#64748b" text-anchor="middle">📎 Attach</text>

  <!-- Send button -->
  <rect x="686" y="86" width="38" height="38" rx="10" fill="#6366f1"/>
  <text x="705" y="110" font-family="Inter,sans-serif" font-size="14" fill="white" text-anchor="middle">↑</text>

  <!-- POPOVER (floating above the bar) -->
  <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(0,0,0,0.6)"/></filter>
  <rect x="40" y="168" width="320" height="278" rx="14" fill="#1a1d27" stroke="#2e3248" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Search bar inside popover -->
  <rect x="52" y="180" width="296" height="32" rx="8" fill="#14171f" stroke="#252836" stroke-width="1"/>
  <text x="68" y="201" font-family="Inter,sans-serif" font-size="10" fill="#475569">🔍  Search prompts...</text>

  <!-- Divider -->
  <line x1="52" y1="224" x2="348" y2="224" stroke="#252836" stroke-width="1"/>

  <!-- ── Global Prompts section ── -->
  <!-- Section header row -->
  <text x="60" y="241" font-family="Inter,sans-serif" font-size="8" fill="#64748b">▼</text>
  <text x="70" y="241" font-family="Inter,sans-serif" font-size="9" fill="#475569">🌐</text>
  <text x="84" y="241" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#94a3b8">Global Prompts</text>
  <rect x="296" y="231" width="24" height="15" rx="7" fill="rgba(99,102,241,0.15)"/>
  <text x="308" y="243" font-family="Inter,sans-serif" font-size="8" fill="#818cf8" text-anchor="middle">9</text>

  <!-- Company sub-category -->
  <text x="68" y="260" font-family="Inter,sans-serif" font-size="8" fill="#64748b">▼</text>
  <text x="78" y="260" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Company</text>

  <!-- Prompt items under Company -->
  <rect x="80" y="266" width="255" height="27" rx="7" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <rect x="90" y="273" width="13" height="13" rx="3" fill="#6366f1"/>
  <text x="96" y="284" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="700" text-anchor="middle">✓</text>
  <text x="112" y="281" font-family="Inter,sans-serif" font-size="9.5" font-weight="600" fill="#e2e8f0">Company General Assistant</text>

  <rect x="80" y="297" width="255" height="27" rx="7" fill="rgba(255,255,255,0.02)"/>
  <rect x="90" y="304" width="13" height="13" rx="3" fill="none" stroke="#3e4258" stroke-width="1.5"/>
  <text x="112" y="312" font-family="Inter,sans-serif" font-size="9.5" fill="#94a3b8">Onboarding Guide</text>
  <text x="112" y="323" font-family="Inter,sans-serif" font-size="8" fill="#475569">Help new employees get started quickly</text>

  <!-- Systems sub-category -->
  <text x="68" y="342" font-family="Inter,sans-serif" font-size="8" fill="#64748b">▶</text>
  <text x="78" y="342" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Systems and Software</text>
  <rect x="264" y="332" width="24" height="15" rx="7" fill="rgba(255,255,255,0.05)"/>
  <text x="276" y="344" font-family="Inter,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">4</text>

  <!-- CRM sub-category -->
  <text x="68" y="360" font-family="Inter,sans-serif" font-size="8" fill="#64748b">▶</text>
  <text x="78" y="360" font-family="Inter,sans-serif" font-size="9" fill="#64748b">CRM</text>
  <rect x="264" y="350" width="24" height="15" rx="7" fill="rgba(255,255,255,0.05)"/>
  <text x="276" y="362" font-family="Inter,sans-serif" font-size="8" fill="#64748b" text-anchor="middle">3</text>

  <!-- Divider -->
  <line x1="52" y1="376" x2="348" y2="376" stroke="#252836" stroke-width="1"/>

  <!-- ── Individual Prompts section ── -->
  <text x="60" y="393" font-family="Inter,sans-serif" font-size="8" fill="#64748b">▼</text>
  <text x="70" y="393" font-family="Inter,sans-serif" font-size="9" fill="#475569">👤</text>
  <text x="84" y="393" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#94a3b8">My Prompts</text>
  <rect x="296" y="383" width="24" height="15" rx="7" fill="rgba(16,185,129,0.12)"/>
  <text x="308" y="395" font-family="Inter,sans-serif" font-size="8" fill="#34d399" text-anchor="middle">5</text>

  <rect x="80" y="399" width="255" height="27" rx="7" fill="rgba(255,255,255,0.02)"/>
  <rect x="90" y="407" width="13" height="13" rx="3" fill="none" stroke="#3e4258" stroke-width="1.5"/>
  <text x="112" y="415" font-family="Inter,sans-serif" font-size="9.5" fill="#94a3b8">My Code Review Template</text>

  <rect x="80" y="430" width="255" height="27" rx="7" fill="rgba(255,255,255,0.02)"/>
  <rect x="90" y="438" width="13" height="13" rx="3" fill="none" stroke="#3e4258" stroke-width="1.5"/>
  <text x="112" y="446" font-family="Inter,sans-serif" font-size="9.5" fill="#94a3b8">Weekly Status Update</text>

  <!-- ── Right side: Project prompt section ── -->
  <rect x="400" y="168" width="340" height="278" rx="14" fill="#1a1d27" stroke="#2e3248" stroke-width="1.5"/>

  <text x="418" y="196" font-family="Inter,sans-serif" font-size="12" font-weight="700" fill="#f1f5f9">Project Context Panel</text>
  <text x="418" y="212" font-family="Inter,sans-serif" font-size="9" fill="#64748b">Q4 Sales Analysis Project</text>

  <line x1="418" y1="222" x2="728" y2="222" stroke="#252836" stroke-width="1"/>

  <!-- Mode info -->
  <text x="418" y="240" font-family="Inter,sans-serif" font-size="9" fill="#64748b" font-weight="600" text-transform="uppercase" letter-spacing="0.08em">ASSIGNED PROMPT</text>

  <rect x="418" y="248" width="305" height="52" rx="10" fill="rgba(99,102,241,0.10)" stroke="rgba(99,102,241,0.25)" stroke-width="1"/>
  <text x="434" y="267" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#818cf8">Company General Assistant</text>
  <text x="434" y="283" font-family="Inter,sans-serif" font-size="8.5" fill="#64748b">Category: Company</text>
  <text x="434" y="295" font-family="Inter,sans-serif" font-size="8.5" fill="#475569">Provides company-wide Q&amp;A support</text>

  <text x="684" y="267" font-family="Inter,sans-serif" font-size="8.5" fill="#6366f1">Change</text>

  <!-- Separator -->
  <line x1="418" y1="316" x2="728" y2="316" stroke="#252836" stroke-width="1"/>

  <!-- Mode selector -->
  <text x="418" y="334" font-family="Inter,sans-serif" font-size="9" fill="#64748b" font-weight="600">ACTIVE MODE</text>
  <rect x="418" y="342" width="305" height="40" rx="10" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="434" y="360" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#34d399">CRM Analyst</text>
  <text x="434" y="375" font-family="Inter,sans-serif" font-size="8.5" fill="#64748b">GPT-4o  ·  32K context</text>

  <!-- MCP info -->
  <line x1="418" y1="398" x2="728" y2="398" stroke="#252836" stroke-width="1"/>
  <text x="418" y="416" font-family="Inter,sans-serif" font-size="9" fill="#64748b" font-weight="600">MCP SERVERS</text>

  <rect x="418" y="424" width="90" height="24" rx="6" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
  <text x="463" y="440" font-family="Inter,sans-serif" font-size="8.5" fill="#fbbf24" text-anchor="middle">SharePoint</text>

  <rect x="516" y="424" width="78" height="24" rx="6" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
  <text x="555" y="440" font-family="Inter,sans-serif" font-size="8.5" fill="#22d3ee" text-anchor="middle">Jira Search</text>

  <!-- Connector line from button to popover -->
  <path d="M 118 158 L 118 168" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
</svg>
