<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 570" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ragbrain system architecture diagram">
  <defs>
    <style>text { font-family: Inter, 'Segoe UI', system-ui, sans-serif; }</style>
    <linearGradient id="rb-gradCloudflare" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="rb-gradShell" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="rb-gradMFE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="rb-gradAuth" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="rb-gradAPI" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="rb-gradDB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.2"/>
    </linearGradient>
    <marker id="rb-arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6" opacity="0.8"/>
    </marker>
    <marker id="rb-arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7" opacity="0.8"/>
    </marker>
    <marker id="rb-arrowCyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="570" fill="#0d0f14" rx="12"/>
  <rect x="10" y="10" width="940" height="550" rx="10" fill="none" stroke="#252836" stroke-width="1"/>

  <!-- Layer 0: Cloudflare Pages -->
  <rect x="30" y="20" width="900" height="56" rx="10" fill="url(#rb-gradCloudflare)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#fbbf24">☁  Cloudflare Pages CDN</text>
  <text x="480" y="62" text-anchor="middle" font-size="9" fill="#f59e0b">Static assets cached 1yr · Remote entries no-cache · SPA _redirects · CORS headers</text>

  <!-- Arrow: Cloudflare → Shell -->
  <line x1="480" y1="76" x2="480" y2="106" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowBlue)" opacity="0.7"/>

  <!-- Layer 1: Single-SPA Shell -->
  <rect x="80" y="108" width="680" height="62" rx="10" fill="url(#rb-gradShell)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="420" y="133" text-anchor="middle" font-size="13" font-weight="600" fill="#60a5fa">🔷  Single-SPA Shell  ·  Port 3000</text>
  <text x="420" y="152" text-anchor="middle" font-size="9" fill="#93c5fd">Auth0Provider · ConfigContext · React Router 6 · RxJS EventBus · window.shellAuth bridge</text>

  <!-- Auth0 box -->
  <rect x="790" y="108" width="140" height="62" rx="10" fill="url(#rb-gradAuth)" stroke="#10b981" stroke-width="1.5"/>
  <text x="860" y="133" text-anchor="middle" font-size="13" font-weight="600" fill="#34d399">🔐  Auth0</text>
  <text x="860" y="152" text-anchor="middle" font-size="9" fill="#6ee7b7">PKCE · JWT · Refresh</text>

  <!-- Arrow: Shell → Auth0 -->
  <line x1="760" y1="139" x2="790" y2="139" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowCyan)" opacity="0.7"/>

  <!-- Arrows: Shell → MFEs -->
  <line x1="150" y1="170" x2="103"  y2="232" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowPurple)" opacity="0.7"/>
  <line x1="240" y1="170" x2="255"  y2="232" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowPurple)" opacity="0.7"/>
  <line x1="350" y1="170" x2="387"  y2="232" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowPurple)" opacity="0.7"/>
  <line x1="460" y1="170" x2="520"  y2="232" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowPurple)" opacity="0.7"/>
  <line x1="570" y1="170" x2="655"  y2="232" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowPurple)" opacity="0.7"/>

  <!-- MFE: Gen-Flow -->
  <rect x="14" y="234" width="158" height="68" rx="8" fill="url(#rb-gradMFE)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="93" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#c084fc">🌊  Gen-Flow</text>
  <text x="93" y="273" text-anchor="middle" font-size="9" fill="#a78bfa">Port 3006</text>
  <text x="93" y="289" text-anchor="middle" font-size="9" fill="#a78bfa">RAG · Tasks · OCR</text>

  <!-- MFE: Agents -->
  <rect x="186" y="234" width="158" height="68" rx="8" fill="url(#rb-gradMFE)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="265" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#c084fc">🤖  Agents</text>
  <text x="265" y="273" text-anchor="middle" font-size="9" fill="#a78bfa">Port 3001</text>
  <text x="265" y="289" text-anchor="middle" font-size="9" fill="#a78bfa">Agent Builder</text>

  <!-- MFE: Agentic-Flow -->
  <rect x="358" y="234" width="158" height="68" rx="8" fill="url(#rb-gradMFE)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="437" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#c084fc">⚡  Agentic-Flow</text>
  <text x="437" y="273" text-anchor="middle" font-size="9" fill="#a78bfa">Port 3002</text>
  <text x="437" y="289" text-anchor="middle" font-size="9" fill="#a78bfa">Zustand · Workflows</text>

  <!-- MFE: Dynamic-Agent -->
  <rect x="530" y="234" width="158" height="68" rx="8" fill="url(#rb-gradMFE)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="609" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#c084fc">🎯  Dynamic-Agent</text>
  <text x="609" y="273" text-anchor="middle" font-size="9" fill="#a78bfa">Port 3004</text>
  <text x="609" y="289" text-anchor="middle" font-size="9" fill="#a78bfa">Dynamic Config</text>

  <!-- MFE: LibreChat -->
  <rect x="702" y="234" width="158" height="68" rx="8" fill="url(#rb-gradMFE)" stroke="#a855f7" stroke-width="1.5"/>
  <text x="781" y="258" text-anchor="middle" font-size="12" font-weight="600" fill="#c084fc">💬  LibreChat</text>
  <text x="781" y="273" text-anchor="middle" font-size="9" fill="#a78bfa">Port 3005</text>
  <text x="781" y="289" text-anchor="middle" font-size="9" fill="#a78bfa">React 17 · Jotai</text>

  <!-- Module Federation badge -->
  <rect x="330" y="304" width="220" height="22" rx="6" fill="rgba(124,58,237,0.15)" stroke="#7c3aed" stroke-width="1"/>
  <text x="440" y="319" text-anchor="middle" font-size="9" fill="#a78bfa">⚙  Webpack 5 Module Federation — each MFE exposes ./App</text>

  <!-- Arrows: MFEs → API -->
  <line x1="93"  y1="302" x2="320" y2="372" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowCyan)" opacity="0.6"/>
  <line x1="265" y1="302" x2="370" y2="372" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowCyan)" opacity="0.6"/>
  <line x1="437" y1="302" x2="450" y2="372" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowCyan)" opacity="0.6"/>
  <line x1="609" y1="302" x2="530" y2="372" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowCyan)" opacity="0.6"/>

  <!-- Layer 3: Axios API Client -->
  <rect x="240" y="374" width="420" height="52" rx="8" fill="url(#rb-gradAPI)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="450" y="396" text-anchor="middle" font-size="13" font-weight="600" fill="#22d3ee">🔌  Axios API Client</text>
  <text x="450" y="413" text-anchor="middle" font-size="9" fill="#67e8f9">Bearer token injection · 401 retry queue · Token refresh · public/config.json base URL</text>

  <!-- Arrows: API → Backend -->
  <line x1="330" y1="426" x2="180" y2="480" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowCyan)" opacity="0.6"/>
  <line x1="450" y1="426" x2="450" y2="480" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowCyan)" opacity="0.6"/>
  <line x1="570" y1="426" x2="730" y2="480" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#rb-arrowCyan)" opacity="0.6"/>

  <!-- Backend: LLM Server -->
  <rect x="40" y="482" width="268" height="66" rx="8" fill="url(#rb-gradDB)" stroke="#f87171" stroke-width="1.5"/>
  <text x="174" y="506" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">🧠  LLM Server</text>
  <text x="174" y="522" text-anchor="middle" font-size="9" fill="#fca5a5">/llm/providers · /llm/run-agent</text>
  <text x="174" y="537" text-anchor="middle" font-size="9" fill="#fca5a5">OpenAI · OpenRouter · Anthropic</text>

  <!-- Backend: RAG Server -->
  <rect x="346" y="482" width="208" height="66" rx="8" fill="url(#rb-gradDB)" stroke="#f87171" stroke-width="1.5"/>
  <text x="450" y="506" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">📚  RAG Server</text>
  <text x="450" y="522" text-anchor="middle" font-size="9" fill="#fca5a5">/rag/upload · /rag/list_indexes</text>
  <text x="450" y="537" text-anchor="middle" font-size="9" fill="#fca5a5">ElasticSearch · bge-m3</text>

  <!-- Backend: PostgreSQL -->
  <rect x="592" y="482" width="290" height="66" rx="8" fill="url(#rb-gradDB)" stroke="#f87171" stroke-width="1.5"/>
  <text x="737" y="506" text-anchor="middle" font-size="13" font-weight="600" fill="#fca5a5">🗄  PostgreSQL</text>
  <text x="737" y="522" text-anchor="middle" font-size="9" fill="#fca5a5">/postgres/project · /postgres/document-types</text>
  <text x="737" y="537" text-anchor="middle" font-size="9" fill="#fca5a5">Projects · Documents · Users</text>
</svg>
